name: Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'langchain_agent/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'langchain_agent/**'

jobs:
  test-config-builder:
    name: Config Builder & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Create test .env
        run: |
          cd langchain_agent
          cat > .env.test << EOF
          GOOGLE_API_KEY=test-key-12345
          API_KEY=test-api-key-12345
          EOF

      - name: Run Config Builder Tests
        run: |
          cd langchain_agent
          pytest tests/config_builder/ -v -k "not live" --tb=short --timeout=30

      - name: Run Unit Tests
        run: |
          cd langchain_agent
          pytest tests/unit/ -v --tb=short --timeout=30

      - name: Generate coverage report
        run: |
          cd langchain_agent
          pytest tests/config_builder/ tests/unit/ -v -k "not live" \
            --cov=. --cov-report=xml --cov-report=term-missing || true
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./langchain_agent/coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  lint-backend:
    name: Backend Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Check code formatting with black
        run: |
          cd langchain_agent
          black --check . --exclude venv/ || true

      - name: Sort imports with isort
        run: |
          cd langchain_agent
          isort --check-only . --skip venv/ || true

      - name: Lint with flake8
        run: |
          cd langchain_agent
          flake8 . --exclude venv/ --max-line-length=100 --count || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install type checking tools
        run: |
          pip install --upgrade pip
          pip install mypy types-requests

      - name: Type check with mypy
        run: |
          cd langchain_agent
          mypy main.py --ignore-missing-imports || true

