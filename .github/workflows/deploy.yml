name: Deploy to GCP

env:
  PROJECT_ID: gen-lang-client-0250737934
  REGION: us-central1
  SERVICE_NAME: rusty-compass
  ARTIFACT_REPO: rusty-compass

on:
  push:
    branches: [main]
    paths:
      - 'langchain_agent/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/test.yml'

jobs:
  test:
    name: Config Builder & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd langchain_agent
          pip install --upgrade pip
          pip install 'psycopg[binary]>=3.3.0' 'psycopg-pool>=3.3.0'
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-timeout pytest-xdist

      - name: Create test .env
        run: |
          cd langchain_agent
          cat > .env.test << EOF
          GOOGLE_API_KEY=test-key-12345
          API_KEY=test-api-key-12345
          EOF

      - name: Run Config Builder Tests
        run: |
          cd langchain_agent
          PYTHONPATH=. pytest tests/config_builder/ -v -k "not live" --tb=short --timeout=30

      - name: Run Unit Tests
        run: |
          cd langchain_agent
          PYTHONPATH=. pytest tests/unit/ -v --tb=short --timeout=30

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          cd langchain_agent
          docker build \
            --platform=linux/amd64 \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:latest"

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --concurrency=80 \
            --cpu-throttling \
            --timeout=3600 \
            --add-cloudsql-instances="${{ env.PROJECT_ID }}:${{ env.REGION }}:rusty-compass-db" \
            --set-env-vars="POSTGRES_HOST=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:rusty-compass-db,POSTGRES_USER=postgres,POSTGRES_DB=langchain_agent,LLM_MODEL=gemini-2.5-flash,EMBEDDINGS_MODEL=models/gemini-embedding-001,RERANKER_MODEL=gemini-2.5-flash-lite,QUERY_EVAL_MODEL=gemini-2.5-flash-lite,VECTOR_DIMENSION=768,LOG_FORMAT=json,LOG_LEVEL=INFO,ENABLE_RERANKING=true,ENABLE_QUERY_EVALUATION=true,ENABLE_CONFIG_BUILDER=true,ENABLE_DOC_WRITER=true,ENABLE_CONTENT_TYPE_CLASSIFICATION=true,OPENSEARCH_HOST=34.138.97.13,OPENSEARCH_PORT=9200,OPENSEARCH_USE_SSL=true,OPENSEARCH_VERIFY_CERTS=false,OPENSEARCH_INDEX_NAME=rusty_compass_docs" \
            --set-secrets="GOOGLE_API_KEY=rusty-compass-google-api-key:latest,API_KEY=rusty-compass-api-key:latest,POSTGRES_PASSWORD=rusty-compass-db-password:latest,OPENSEARCH_USER=rusty-compass-opensearch-user:latest,OPENSEARCH_PASSWORD=rusty-compass-opensearch-password:latest" \
            --quiet

      - name: Verify deployment
        run: |
          sleep 5
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          curl -f "$SERVICE_URL/api/health" || exit 1
          echo "✅ Deployment successful"
