# Cloud Build configuration for Rusty Compass
# Triggered on push to main branch (configure via Cloud Build Triggers)
#
# Required substitutions (set in trigger or via --substitutions):
#   _REGION:              Deployment region (default: us-central1)
#   _SERVICE_NAME:        Cloud Run service name (default: rusty-compass)
#   _ARTIFACT_REPO:       Artifact Registry repo name (default: rusty-compass)
#   _CLOUD_SQL_INSTANCE:  Cloud SQL instance name (default: rusty-compass-db)
#
# Required secrets (stored in Secret Manager):
#   rusty-compass-google-api-key
#   rusty-compass-api-key
#   rusty-compass-db-password

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: rusty-compass
  _ARTIFACT_REPO: rusty-compass
  _CLOUD_SQL_INSTANCE: rusty-compass-db
  _DB_USER: postgres
  _DB_NAME: langchain_agent

steps:
  # Step 1: Build Docker image (reads API key from Secret Manager for frontend build)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_API_KEY=$$API_KEY \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest \
          .
    dir: 'langchain_agent'
    secretEnv: ['API_KEY']

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--platform=managed'
      - '--region=${_REGION}'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--concurrency=80'
      - '--cpu-throttling'
      - '--timeout=3600'
      - '--add-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}'
      - '--set-env-vars=POSTGRES_HOST=/cloudsql/${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE},POSTGRES_USER=${_DB_USER},POSTGRES_DB=${_DB_NAME},LLM_MODEL=gemini-2.5-flash,EMBEDDINGS_MODEL=models/gemini-embedding-001,RERANKER_MODEL=gemini-2.5-flash-lite,QUERY_EVAL_MODEL=gemini-2.5-flash-lite,VECTOR_DIMENSION=768,LOG_FORMAT=json,LOG_LEVEL=INFO,ENABLE_RERANKING=true,ENABLE_QUERY_EVALUATION=true,ENABLE_CONFIG_BUILDER=true,ENABLE_DOC_WRITER=true,ENABLE_CONTENT_TYPE_CLASSIFICATION=true'
      - '--set-secrets=GOOGLE_API_KEY=rusty-compass-google-api-key:latest,API_KEY=rusty-compass-api-key:latest,POSTGRES_PASSWORD=rusty-compass-db-password:latest'
      - '--quiet'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/rusty-compass-api-key/versions/latest
      env: 'API_KEY'

timeout: '1200s'
