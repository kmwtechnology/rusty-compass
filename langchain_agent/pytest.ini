[pytest]
# Pytest configuration for Rusty Compass

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for test categorization
markers =
    phase1: Phase 1 critical tests (validation, core error handling)
    phase2: Phase 2 important tests (integration, edge cases)
    phase3: Phase 3 comprehensive tests (full coverage)
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take > 1 second
    auth: Authentication tests
    search: Search/retrieval tests
    rerank: Reranking tests
    websocket: WebSocket tests
    database: Database tests

# Timeout for tests (prevent hanging)
timeout = 30

# Coverage options
# Run with: pytest --cov=. --cov-report=html
testpaths = tests

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Minimum Python version
minversion = 3.13
