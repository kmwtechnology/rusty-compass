connectors: [
  {
    class: "com.kmwllc.lucille.connector.FileConnector"
    paths: ["data/test.csv"]
    name: "connector1"
    pipeline: "pipeline1"
  }
]
pipelines: [
  {
    name: "pipeline1"
    stages: [
      {
        class: "com.kmwllc.lucille.stage.DeleteFields"
        name: "delFields"
        fields: ["temp"]
      }
    ]
  }
]
indexer {
  type: "OpenSearch"
  sendEnabled: true
}
opensearch {
  url: "http://localhost:9200"
  index: "test"
}
